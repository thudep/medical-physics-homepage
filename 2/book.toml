[book]
authors = ["fyb24"]
description = "医学物理挑战赛赛事平台"
language = "zh-CN"
multilingual = false
src = "./src"
title = "医学物理挑战赛"

[preprocessor.katex]
after = ["links"]
output = "htmlAndMathml"
pre-render = true

[output.html]
additional-css = ["css/fontsize.css"]
git-repository-url = "https://github.com/thudep/medical-physics-homepage"

[output.html.search]
boost-hierarchy = 2
boost-paragraph = 1
boost-title = 2
expand = true
heading-split-level = 2
limit-results = 20
use-boolean-and = true